<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Control Leds y Motores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container overflow-hidden text-center">
        <h1>Control 8 Leds y 2 Motores</h1>
        <div class="row gy-10">
            <div class="col p-4">
                <div class="row">
                    <div class="col p-2">
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-light btn-lg">Q</button>
                        </div>
                    </div>
                    <div class="col">
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-light btn-lg">W</button>
                        </div>                </div>
                    <div class="col">
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-light btn-lg">E</button>
                        </div>
                    </div>
                </div>
            <div class="row">
                <div class="col">
                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-light btn-lg">A</button>
                    </div>
                </div>
                <div class="col">
                   <div class="d-grid gap-2">
                        <button type="button" class="btn btn-light btn-lg">S</button>
                    </div>
                </div>
                <div class="col">
                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-light btn-lg">D</button>
                    </div>
                </div>
            </div>
            </div>
            <div class="col p-4">
                <div class="row">
                    <div class="col">
                        <label for="tiempoAdelante" class="form-label">Tiempo Recorrido Adelante [s]</label>
                    </div>
                    <div class="col">
                        <input type="number" class="form-control" id="tiempoAdelante">
                    </div>
                    <div class="col">
                        <button type="button" class="btn btn-primary">Enviar</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="tiempoAtras" class="form-label">Tiempo Recorrido Atras [s]</label>
                    </div>
                    <div class="col">
                        <input type="number" class="form-control" id="tiempoAtras">
                    </div>
                    <div class="col">
                        <button type="button" class="btn btn-primary">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='scripts.js')}}"></script>
</body>
</html>
